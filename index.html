<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>HRV measurement</title>
<style>
  html,body{background:#08090C;color:#EEF0F4;font:15px/1.4 system-ui,sans-serif;margin:0;padding:16px}
  /* Mät-mätare: ring (mät-tid, sluts vid klar) + live-BPM i mitten. ⚠️ Live-BPM = lättvikts-
     peak-räkning i JS (display-only, Johans val) — den AUKTORITATIVA BPM:en räknas NATIVE.
     Detta lägger medvetet en enkel peak-räknare på publika sidan (bryter "noll-DSP/IP-grep"). */
  #meter{position:relative;width:172px;height:172px;margin:8px auto 0}
  #ring{width:100%;height:100%;transform:rotate(-90deg)}
  #ringTrack{fill:none;stroke:#15171d;stroke-width:8}
  #ringProg{fill:none;stroke:#00F082;stroke-width:8;stroke-linecap:round;
    stroke-dasharray:339.292;stroke-dashoffset:339.292;transition:stroke-dashoffset .12s linear}
  #meterCenter{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  #bpmNum{font-size:54px;font-weight:bold;color:#00F082;line-height:1}
  #bpmUnit{font-size:13px;color:#8a8f98;letter-spacing:2px;margin-top:3px}
  #sub{font-size:13px;color:#8a8f98;margin-top:10px;text-align:center}
  /* Instruktion på tapp-skärmen (flyttad från native start-kortet) — döljs när mätningen kör.
     Två punkter, större text (17px) med hängande indrag (Johans önskemål). */
  #intro{margin:18px auto 0;max-width:320px;text-align:left}
  #intro .iLine{font-size:17px;color:#dfe2e8;line-height:1.45;padding-left:18px;text-indent:-18px}
  #intro .iLine + .iLine{margin-top:12px}
  #intro b{color:#EEF0F4;font-weight:600}
  #log{font-size:11px;color:#5a6a5a;white-space:pre-wrap;margin-top:8px}
  /* Live-pulsvågform (filtrerad signal via inlinad Butterworth = lärobok). Lånat utseende
     från webbappens drawWaveform — UTAN peak-markörer (peak-detektion = IP, körs native). */
  #wave{display:block;width:100%;height:150px;margin-top:14px;background:#0D0F14;border-radius:14px}
  /* Andningsguide (overlay UNDER mätning). REN DOM-animation lånad från webbappens
     breathing.js animateBreathCircle — NOLL IP (sätter bara cirkel-storlek/färg/text per
     fas, ingen DSP). Påverkar EJ rå R/G/B → native. Drivs av graf-timern (elapsed). */
  #breath{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:160px;margin-top:14px}
  #bCirc{width:48px;height:48px;border-radius:50%;background:rgba(0,190,216,0.2);border:2px solid rgba(0,190,216,0.5)}
  #bLab{margin-top:16px;font-size:16px;font-weight:bold;color:#cfd3da}
  #bSub{font-size:13px;color:#8a8f98;margin-top:2px}
  #bPat{font-size:11px;color:#5a6a7a;margin-top:10px}
  /* Tap-to-start: en tap PÅ SIDAN ger user-activation → Chrome tillåter navigator.vibrate (haptik). */
  #startBtn{display:block;margin-top:16px;width:100%;padding:18px 16px;background:#00F082;color:#08090C;
    border:none;border-radius:14px;font-size:19px;font-weight:bold}
  #stopBtn{display:none;margin-top:14px;width:100%;padding:16px;background:#15171d;color:#ff6b6b;
    border:1px solid #ff6b6b55;border-radius:14px;font-size:17px;font-weight:bold}
  /* Redirect-robusthet: tappbar resultat-länk vid mätslut → färsk user-gesture. */
  #resultBtn{display:none;margin-top:14px;padding:18px 16px;background:#00F082;color:#08090C;
    font-size:21px;font-weight:bold;text-align:center;text-decoration:none;border-radius:14px}
  /* Video körs (getUserMedia → capture) men VISAS EJ — 1px offscreen (ej display:none, som
     kan stoppa frame-leverans i Chrome). Vågformen ger den visuella feedbacken istället. */
  #V{position:fixed;top:0;left:0;width:1px;height:1px;opacity:0.01;pointer-events:none;z-index:-1}
  canvas#C{display:none}
</style></head>
<body>
<div id="meter">
  <svg id="ring" viewBox="0 0 120 120">
    <circle id="ringTrack" cx="60" cy="60" r="54"/>
    <circle id="ringProg" cx="60" cy="60" r="54"/>
  </svg>
  <div id="meterCenter"><div id="bpmNum">--</div><div id="bpmUnit">BPM</div></div>
</div>
<div id="sub"></div>
<div id="intro">
  <div class="iLine">• Place your fingertip lightly over the <b>camera and flash</b></div>
  <div class="iLine">• Hold your finger <b>still</b> during the measurement. Rest your hand on a table.</div>
</div>
<button id="startBtn">▶ Tap to start</button>
<canvas id="wave"></canvas>
<div id="breath">
  <div id="bCirc"></div>
  <div id="bLab">Breathe in</div>
  <div id="bSub">5s</div>
  <div id="bPat">Breathing: Resonance · tap to switch</div>
</div>
<button id="stopBtn">⏹ Stop measurement</button>
<a id="resultBtn" href="#">Show result →</a>
<div id="log"></div>
<video id="V" autoplay playsinline muted></video>
<canvas id="C" width="32" height="24"></canvas>
<!-- TILLFÄLLIG haptik-diagnostik (ta bort + bumpa cache när rotorsaken är fastställd). -->
<div id="hd" style="position:fixed;left:0;right:0;bottom:0;z-index:99999;background:rgba(0,0,0,.85);color:#0f0;font:11px/1.45 monospace;padding:7px 9px;white-space:pre-wrap;pointer-events:none"></div>

<script>
// ════════════════════════════════════════════════════════════════════════
// HRV MÄT-MOTOR (capture-only, PRODUKTION) — IP-skyddad arkitektur.
//
// Sidan kör: getUserMedia + per-frame R/G/B-medel (central 24×16 ROI) + gzip → hrvresult://raw.
// Live-vågformen filtreras med INLINAD Butterworth (bp2/bp4/af/ff1/ff/detrend = LÄROBOK,
// bilinear-transform + zero-phase filtfilt + moving-average). Det är BARA för VISNING.
//
// INGEN peak-detektion, INGEN SQI, INGEN HRV-compute här (= IP). ALL auktoritativ DSP körs
// NATIVE i APK:n på den rå R/G/B-strömmen (RawPayloadCodec → SignalProcessor). Den rå
// strömmen är single source of truth; vågformen påverkar EJ vad native får.
//
// TORCH: host-FG-service äger torch (setTorchMode Order 1). Sidan begär aldrig torch.
// ════════════════════════════════════════════════════════════════════════
const SUB  = document.getElementById('sub');
const RINGP = document.getElementById('ringProg');
const BPMN  = document.getElementById('bpmNum');
const LOG  = document.getElementById('log');
const V    = document.getElementById('V');
const C    = document.getElementById('C');
const WAVE = document.getElementById('wave');
const STOP = document.getElementById('stopBtn');
const cx   = C.getContext('2d', { willReadFrequently: true });

const SETTLE = 3;
// Host-parametrar via URL: ?dur=<sek> (30/60/300, default 60) + ?breath=0|1 (andningsguide av/på).
const _params = new URLSearchParams(location.search);
// ── i18n: engelska = default; svenska via ?lang=sv (host skickar appens språk) el. navigator.language.
// Lägg till språk = ny nyckel nedan. ⚠️ Ändrar du texterna → BUMPA CACHE_VERSION i sw.js.
const I18N = {
  en: {
    title: 'HRV measurement',
    intro1: '• Place your fingertip lightly over the <b>camera and flash</b>',
    intro2: '• Hold your finger <b>still</b> during the measurement. Rest your hand on a table.',
    start: '▶ Tap to start', stop: '⏹ Stop measurement', showResult: 'Show result →',
    breathPrefix: 'Breathing: ', breathSwitch: ' · tap to switch',
    phaseIn: 'Breathe in', phaseOut: 'Breathe out', phaseHold: 'Hold',
    patterns: ['Resonance', '4-7-8', 'Box'],
    measuring: 'measuring — hold your finger still', noSignal: '✗ no signal',
    placeFinger: 'place your finger over the camera', camFail: 'Camera error: ',
    compressing: (n) => 'Compressing ' + n + ' samples…',
    done: (n, kb) => 'Done — ' + n + ' samples (' + kb + ' KB) · tap below ↓',
  },
  sv: {
    title: 'HRV-mätning',
    intro1: '• Lägg pekfingret lätt över <b>kamera och lampa</b>',
    intro2: '• Håll fingret <b>stilla</b> under mätning. Vila gärna handen på ett bord.',
    start: '▶ Tryck för att börja', stop: '⏹ Stoppa mätning', showResult: 'Visa resultat →',
    breathPrefix: 'Andning: ', breathSwitch: ' · tryck för att byta',
    phaseIn: 'Andas in', phaseOut: 'Andas ut', phaseHold: 'Håll',
    patterns: ['Resonans', '4-7-8', 'Box'],
    measuring: 'mäter — håll fingret stilla', noSignal: '✗ ingen signal',
    placeFinger: 'lägg fingret över kameran', camFail: 'Kamerafel: ',
    compressing: (n) => 'Komprimerar ' + n + ' sampel…',
    done: (n, kb) => 'Klar — ' + n + ' sampel (' + kb + ' KB) · tryck nedan ↓',
  },
};
const LANG = (_params.get('lang') || navigator.language || 'en').slice(0, 2).toLowerCase();
const TR = I18N[LANG] || I18N.en;   // TR (EJ T — T är timestamp-arrayen i finish())
// Sätter alla statiska texter ur valt språk (anropas efter breathIdx definierats). Bara DOM/text.
function applyLang() {
  document.documentElement.lang = LANG;
  document.title = TR.title;
  document.getElementById('intro').innerHTML =
    '<div class="iLine">' + TR.intro1 + '</div><div class="iLine">' + TR.intro2 + '</div>';
  document.getElementById('startBtn').textContent = TR.start;
  document.getElementById('stopBtn').textContent = TR.stop;
  document.getElementById('resultBtn').textContent = TR.showResult;
  document.getElementById('bLab').textContent = TR.phaseIn;
  document.getElementById('bPat').textContent = TR.breathPrefix + TR.patterns[breathIdx] + TR.breathSwitch;
}
const DUR = parseInt(_params.get('dur'), 10) || 60;
const SHOW_BREATH = (_params.get('breath') ?? '1') !== '0';   // default på (bakåtkompat)
// ── TILLFÄLLIG HAPTIK-DIAGNOSTIK — visar VARFÖR vibration uteblir. Ta bort + bumpa cache när löst.
const _HD = { ret: '—', n: 0, tap: '—' };
function hdRender(tag) {
  const el = document.getElementById('hd'); if (!el) return;
  const ua = navigator.userActivation;
  el.textContent =
    'DIAG CACHE v6  [' + tag + ']\n' +
    'vibrateAPI=' + (typeof navigator.vibrate) + '   SHOW_BREATH=' + SHOW_BREATH + '   vis=' + document.visibilityState + '\n' +
    'userActivation=' + (ua ? ('been=' + ua.hasBeenActive + ' active=' + ua.isActive) : 'n/a') + '\n' +
    'startTapVibrate=' + _HD.tap + '   lastPhaseVibrate=' + _HD.ret + '   phaseAttempts=' + _HD.n;
}
hdRender('init');
// EFFEKT-flöde (Mät effekt av guiden): host skickar effect=1 + estep (1/2/3). Vi EKAR dem bara
// vidare in i deep-linken nedan — inget DSP, ingen breath-logik rörd — så native (BridgeResult-
// Activity) vet vilket av de tre stegen som just avslutades. Saknas = vanlig mätning.
const EFFECT = _params.get('effect');
const ESTEP  = _params.get('estep');
// Grafen börjar ritas först GRAPH_DELAY s efter capture-start (utöver SETTLE) så filter-
// kallstarts-transienten (stora initiala peaken) hinner passera ut ur det visade fönstret.
const GRAPH_DELAY = 2.5;

// Capture-state — råa kanalmedel + timestamps (det som går till native). Inga DSP-buffrar.
let raw = [], rawG = [], rawB = [], ts = [];
let fps = 30, t0 = 0, stm = null, wl = null, fired = false;
// Mät-mätare-state: finger-status (clearar BPM när fingret lyfts), EMA-utjämnad BPM, ringomkrets.
let fingerOk = false, bpmEma = null;
const RING_C = 2 * Math.PI * 54;

function log(m) { LOG.textContent += m + '\n'; }

// ── INLINAD LÄROBOKS-FILTER (Butterworth bandpass, zero-phase) — endast för live-graf ──
// Bilinear-transform-design + filtfilt + moving-average-detrend. INGEN proprietär logik.
function bp2(fs, fl, fh) {
  const wL = 2 * Math.PI * fl / fs, wH = 2 * Math.PI * fh / fs;
  const wLw = 2 * fs * Math.tan(wL / 2), wHw = 2 * fs * Math.tan(wH / 2);
  const bw = wHw - wLw, w0 = Math.sqrt(wLw * wHw), Q = .7071;
  const K = 2 * fs, K2 = K * K, w02 = w0 * w0, a0 = K2 + bw * K / Q + w02;
  return { b: [bw * K / a0, 0, -bw * K / a0], a: [1, (2 * w02 - 2 * K2) / a0, (K2 - bw * K / Q + w02) / a0] };
}
function bp4(fs, fl, fh) { return [bp2(fs, fl, fh), bp2(fs, fl, fh)]; }
function af(s, c) {
  const o = new Float64Array(s.length); let z1 = 0, z2 = 0;
  for (let i = 0; i < s.length; i++) {
    const x = s[i], y = c.b[0] * x + z1;
    z1 = c.b[1] * x - c.a[1] * y + z2;
    z2 = c.b[2] * x - c.a[2] * y;
    o[i] = y;
  }
  return o;
}
function ff1(s, c) {
  const p = Math.min(9, s.length - 1), pd = new Float64Array(s.length + 2 * p);
  for (let i = 0; i < p; i++) { pd[i] = 2 * s[0] - s[p - i]; pd[s.length + p + i] = 2 * s[s.length - 1] - s[s.length - 2 - i]; }
  for (let i = 0; i < s.length; i++) pd[p + i] = s[i];
  const f = af(pd, c), r = new Float64Array(f.length);
  for (let i = 0; i < f.length; i++) r[i] = f[f.length - 1 - i];
  const b = af(r, c), o = new Float64Array(s.length);
  for (let i = 0; i < s.length; i++) o[i] = b[b.length - 1 - p - i];
  return o;
}
function ff(s, secs) { let o = s; for (const sec of secs) o = ff1(o, sec); return o; }
function detrend(s, windowSec, fsv) {
  const w = (Math.max(3, Math.round(windowSec * fsv)) | 1), half = (w - 1) / 2;
  const out = new Float64Array(s.length);
  for (let i = 0; i < s.length; i++) {
    const left = Math.max(0, i - half), right = Math.min(s.length - 1, i + half);
    let sum = 0; for (let j = left; j <= right; j++) sum += s[j];
    out[i] = s[i] - sum / (right - left + 1);
  }
  return out;
}

// Glidande amplitud-skala (långsam decay) → linjen studsar EJ vertikalt mellan bilder.
let waveAmp = 1;
// Canvas-storlek sätts EN gång (clientWidth/height ändras ej under mätning) → undvik
// per-bild-reset som annars rensar/omskalar och bidrar till hack.
let waveInit = false;
function ensureWaveSize() {
  if (waveInit) return;
  const dp = devicePixelRatio || 1;
  WAVE.width = WAVE.clientWidth * dp; WAVE.height = WAVE.clientHeight * dp;
  WAVE.getContext('2d').scale(dp, dp);
  waveInit = true;
}

// Rita rullande pulsvågform (lånat utseende från webbappens drawWaveform, UTAN peaks).
function drawWave(filtered) {
  ensureWaveSize();
  const w = WAVE.clientWidth, h = WAVE.clientHeight;
  const g2 = WAVE.getContext('2d'); g2.clearRect(0, 0, w, h);
  g2.strokeStyle = '#00f0820a'; g2.lineWidth = .5;
  for (let y = 0; y < h; y += 20) { g2.beginPath(); g2.moveTo(0, y); g2.lineTo(w, y); g2.stroke(); }
  const vl = Math.min(filtered.length, Math.floor(w * 2));
  if (vl < 2) return;
  const vs = filtered.slice(-vl);
  // Stabil skala: glid mot max med långsam decay (snabb upp, långsam ner) → ingen vertikal studs.
  let am = 0; for (let i = 0; i < vs.length; i++) { const a = Math.abs(vs[i]); if (a > am) am = a; }
  am = am || 1;
  waveAmp = am > waveAmp ? am : waveAmp * 0.95 + am * 0.05;
  const tx = i => (i / (vl - 1)) * w, ty = v => h / 2 - (v / waveAmp) * (h * .4);
  g2.beginPath(); for (let i = 0; i < vs.length; i++) i ? g2.lineTo(tx(i), ty(vs[i])) : g2.moveTo(tx(i), ty(vs[i]));
  g2.lineTo(w, h); g2.lineTo(0, h); g2.closePath();
  const grad = g2.createLinearGradient(0, 0, 0, h); grad.addColorStop(0, '#00f08212'); grad.addColorStop(1, '#00f08200');
  g2.fillStyle = grad; g2.fill();
  g2.beginPath(); g2.strokeStyle = '#00f082'; g2.lineWidth = 1.8; g2.shadowColor = '#00f082'; g2.shadowBlur = 4;
  for (let i = 0; i < vs.length; i++) i ? g2.lineTo(tx(i), ty(vs[i])) : g2.moveTo(tx(i), ty(vs[i]));
  g2.stroke(); g2.shadowBlur = 0;
}

// Graf-uppdatering på EGEN jämn timer (se startGraphLoop) — frikopplad från capture-loopens
// jitter. Filtrerar de senaste ~900 sampel; capture-loopen (59fps) + rå R/G/B → native orörda.
// ── MÄT-RING (mät-tid) + LIVE-BPM-PREVIEW ────────────────────────────────────────────────
// Ringen sluts ∝ förfluten tid / DUR. Live-BPM = ENKEL peak-räkning på den redan filtrerade
// display-signalen (samma som vågformen) → median-intervall → BPM, EMA-utjämnad. ⚠️ RÅ live-
// förhandsvisning (Johans val): den AUKTORITATIVA BPM:en + ALL gating/SQI räknas NATIVE på rå
// R/G/B (oförändrat). Läser bara display-signalen → raw/rawG/ts orörda → native-kontrakt byte-likt.
function updateRing() {
  if (!t0) return;
  const p = Math.min(((performance.now() - t0) / 1e3) / DUR, 1);
  RINGP.style.strokeDashoffset = RING_C * (1 - p);
}
// Lättvikts-peak-räknare (lärobok: lokala max > 40% av fönster-max, refraktär ≥0.33s) → median-RR.
function liveBpm(sig, fsv) {
  const n = sig.length;
  if (n < fsv * 4) return null;
  let mx = 0; for (let i = 0; i < n; i++) { const a = Math.abs(sig[i]); if (a > mx) mx = a; }
  if (mx < 1e-6) return null;
  const thr = mx * 0.4, refr = Math.round(fsv * 0.33), pk = [];
  for (let i = 1; i < n - 1; i++) {
    if (sig[i] > thr && sig[i] >= sig[i - 1] && sig[i] > sig[i + 1]) {
      if (pk.length && i - pk[pk.length - 1] < refr) { if (sig[i] > sig[pk[pk.length - 1]]) pk[pk.length - 1] = i; }
      else pk.push(i);
    }
  }
  if (pk.length < 4) return null;
  const iv = []; for (let i = 1; i < pk.length; i++) iv.push((pk[i] - pk[i - 1]) / fsv);
  iv.sort((a, b) => a - b);
  const bpm = 60 / iv[iv.length >> 1];
  return (bpm >= 35 && bpm <= 200) ? bpm : null;
}
function updateBpm(filt) {
  if (!fingerOk) { bpmEma = null; BPMN.textContent = '--'; return; }
  const b = liveBpm(filt, fps);
  if (b == null) return;                          // behåll senaste visade tills nästa giltiga
  bpmEma = bpmEma == null ? b : bpmEma * 0.7 + b * 0.3;
  BPMN.textContent = Math.round(bpmEma);
}

function updateGraph() {
  if (raw.length < fps * GRAPH_DELAY) return;
  const N = Math.min(raw.length, 900), off = raw.length - N;
  const combined = new Float64Array(N);
  for (let i = 0; i < N; i++) combined[i] = raw[off + i] * 0.4 + rawG[off + i] * 0.6;
  const filt = ff(detrend(combined, 2, fps), bp4(fps, 0.5, 4));
  drawWave(filt);                  // pulsvågform — visas ALLTID (även med andningsguiden på)
  updateBpm(filt);                 // live-BPM ur samma filtrerade signal
}

// ── ANDNINGSGUIDE (verbatim-port av webbappens breathing.js animateBreathCircle) ──
// REN DOM: räknar fas ur elapsed, sätter cirkel-storlek/färg + label + nedräkning. INGEN
// DSP, rör EJ raw/rawG/ts → native opåverkat. Drivs av graf-timern (egen elapsed).
const BREATH_PATTERNS = [
  { name: 'Resonans', phases: [{ t: 5.45, l: 'Andas in', act: 'in' }, { t: 5.45, l: 'Andas ut', act: 'out' }] },
  { name: '4-7-8',    phases: [{ t: 4, l: 'Andas in', act: 'in' }, { t: 7, l: 'Håll', act: 'hold' }, { t: 8, l: 'Andas ut', act: 'out' }] },
  { name: 'Box',      phases: [{ t: 4, l: 'Andas in', act: 'in' }, { t: 4, l: 'Håll', act: 'hold' }, { t: 4, l: 'Andas ut', act: 'out' }, { t: 4, l: 'Håll', act: 'hold' }] },
];
let breathIdx = Math.min(2, Math.max(0, parseInt(_params.get('bpat'), 10) || 0));   // init-mönster från host: 0=Resonans 1=4-7-8 2=Box
applyLang();   // sätt alla statiska texter ur valt språk (TR)
// Lätt haptik vid fas-byte (in/ut/håll) → känn takten utan att titta (Johans önskemål). ⚠️ Kort
// puls (tiotals ms); kan ge en liten rörelse-artefakt i PPG-signalen → hålls lätt.
let lastBreathAct = null;
function breathHaptic(act) {
  _HD.n++;                                                   // DIAG: räkna fas-haptik-försök
  if (!navigator.vibrate) { _HD.ret = 'noAPI'; hdRender('phase'); return; }
  let r;
  if (act === 'in')       r = navigator.vibrate([20, 40, 20]);   // di-dit = andas IN
  else if (act === 'out') r = navigator.vibrate(40);             // en puls = andas UT
  else                    r = navigator.vibrate(15);             // kort = håll
  _HD.ret = String(r);                                      // DIAG: vibrate()-retur (timer-driven)
  hdRender('phase');
}
function animateBreathCircle(elapsed, patIdx, circId, labId, subId) {
  const pat = BREATH_PATTERNS[patIdx];
  const cycleLen = pat.phases.reduce((a, p) => a + p.t, 0);
  const inCycle = elapsed % cycleLen;
  let phaseTime = 0, curPhase = pat.phases[0];
  for (const p of pat.phases) {
    if (inCycle >= phaseTime && inCycle < phaseTime + p.t) { curPhase = p; break; }
    phaseTime += p.t;
  }
  const phaseProgress = (inCycle - phaseTime) / curPhase.t;
  const remaining = Math.ceil(curPhase.t - (inCycle - phaseTime));
  if (curPhase.act !== lastBreathAct) {                 // fas-byte → lätt haptik (ej på allra första)
    if (lastBreathAct !== null) breathHaptic(curPhase.act);
    lastBreathAct = curPhase.act;
  }
  let size;   // kompaktare cirkel (48–128px, var 60–170)
  if (curPhase.act === 'in') size = 48 + 80 * phaseProgress;
  else if (curPhase.act === 'out') size = 128 - 80 * phaseProgress;
  else {
    const phIdx = pat.phases.indexOf(curPhase);
    const prevAct = phIdx > 0 ? pat.phases[phIdx - 1].act : pat.phases[pat.phases.length - 1].act;
    size = prevAct === 'in' ? 128 : 48;
  }
  const circ = document.getElementById(circId);
  if (!circ) return;
  const hue = curPhase.act === 'in' ? 190 : curPhase.act === 'out' ? 170 : 210;
  const intensity = curPhase.act === 'hold' ? 0.1 : 0.2;
  circ.style.width = size + 'px'; circ.style.height = size + 'px';
  circ.style.background = `rgba(0,${hue},216,${intensity})`;
  circ.style.border = `2px solid rgba(0,${hue},216,0.5)`;
  circ.style.transition = 'width 0.15s ease, height 0.15s ease';
  document.getElementById(labId).textContent =
    curPhase.act === 'in' ? TR.phaseIn : curPhase.act === 'out' ? TR.phaseOut : TR.phaseHold;
  document.getElementById(subId).textContent = remaining + 's';
  return cycleLen;
}
function updateBreath() {
  if (!SHOW_BREATH || !t0) return;
  const elapsed = (performance.now() - t0) / 1e3;
  if (elapsed < SETTLE) return;        // animera först när mätningen är aktiv
  animateBreathCircle(elapsed - SETTLE, breathIdx, 'bCirc', 'bLab', 'bSub');
}
document.getElementById('breath').addEventListener('click', () => {
  breathIdx = (breathIdx + 1) % BREATH_PATTERNS.length;
  document.getElementById('bPat').textContent = TR.breathPrefix + TR.patterns[breathIdx] + TR.breathSwitch;
});

async function start() {
  try { wl = await navigator.wakeLock.request('screen'); } catch (_) {}
  const cfgs = [
    { facingMode: 'environment', width: { ideal: 160 }, height: { ideal: 120 }, frameRate: { ideal: 60, min: 30 } },
    { facingMode: 'environment' }, true,
  ];
  for (let i = 0; i < cfgs.length; i++) {
    try { stm = await navigator.mediaDevices.getUserMedia({ video: cfgs[i] }); break; }
    catch (e) { if (i === cfgs.length - 1) { SUB.textContent = TR.camFail + e.name; return; } }
  }
  const tk = stm.getVideoTracks()[0], se = tk.getSettings();
  fps = se.frameRate || 30;
  SUB.textContent = TR.measuring;
  V.srcObject = stm; await V.play();
  STOP.style.display = 'block';
  if (SHOW_BREATH) {
    document.getElementById('breath').style.display = 'flex';   // visa andningsguide (om vald)
    // Sätt etiketten till det VALDA mönstret (annars stod hårdkodad "Resonans" tills man tappade).
    document.getElementById('bPat').textContent = TR.breathPrefix + TR.patterns[breathIdx] + TR.breathSwitch;
  }
  t0 = performance.now();
  startGraphLoop();
  requestAnimationFrame(tick);
}

// Egen jämn graf-timer (~15fps, fast intervall) — frikopplad från capture-loopens jitter.
// Stannar när mätningen avslutas (fired).
let graphTimer = null;
function startGraphLoop() {
  graphTimer = setInterval(() => {
    if (fired) { clearInterval(graphTimer); graphTimer = null; return; }
    updateRing();
    updateGraph();
    updateBreath();
  }, 66);
}

// Per-frame: central 24×16 ROI → R/G/B-medel (UNCHANGED — exakt vad native får).
function tick() {
  if (!stm) return;
  cx.drawImage(V, 0, 0, 32, 24);
  const px = cx.getImageData(4, 4, 24, 16).data;
  let rS = 0, gS = 0, bS = 0, n = 0;
  for (let i = 0; i < px.length; i += 4) { rS += px[i]; gS += px[i + 1]; bS += px[i + 2]; n++; }
  const rA = rS / n, gA = gS / n, bA = bS / n;
  const ok = rA > 100 && rA > bA * 1.3 && rA > gA * 1.05;

  const elapsed = (performance.now() - t0) / 1e3;
  if (ok && elapsed >= SETTLE) {
    raw.push(rA); rawG.push(gA); rawB.push(bA); ts.push(performance.now());
    if (ts.length > 60) { const l = ts.slice(-60); fps = 1e3 / ((l[l.length - 1] - l[0]) / (l.length - 1)); }
  }

  // (Live-grafen ritas EJ här — den körs på en egen jämn timer, startGraphLoop, frikopplad
  // från capture-loopens timing-jitter för mjuk rörelse.)
  fingerOk = ok;   // updateBpm clearar BPM-siffran till "--" när fingret är borta; ringen = mät-tid
  SUB.textContent = ok ? TR.measuring : (rA < 5 ? TR.noSignal : TR.placeFinger);
  if (elapsed >= DUR) { finish(); return; }   // auto-stopp 60s (backup)
  requestAnimationFrame(tick);
}

// gzip+base64url av rå capture-ström (UNCHANGED — native round-trip-kontrakt).
async function gzipB64url(text) {
  const cs = new Blob([text]).stream().pipeThrough(new CompressionStream('gzip'));
  const ab = await new Response(cs).arrayBuffer();
  const bytes = new Uint8Array(ab);
  let bin = '';
  for (let i = 0; i < bytes.length; i += 0x8000)
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
  return { b64: btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, ''), gz: bytes.length };
}

// Mätslut (manuell stopp ELLER auto-stopp 60s) → stäng kamera/torch + deep-link med data
// SÅ HÄR LÅNGT. Native (BridgeResultActivity) stoppar host-FGS → torch av promptt.
// `manual`=true (stopp-knappen) → färsk user-gesture finns → vi navigerar direkt till
// resultatet (se nedan) så host-torch släcks PROMPT. Auto-stopp (60s, ingen färsk beröring →
// user-activation utgången) förlitar sig på den tappbara knappen (redirect-robusthet, #1-fix).
async function finish(manual) {
  if (fired) return; fired = true;
  STOP.style.display = 'none';
  document.getElementById('breath').style.display = 'none';   // dölj andningsguide
  if (stm) { stm.getTracks().forEach(t => t.stop()); stm = null; }   // släpper kameran
  if (wl) { try { wl.release(); } catch (_) {} wl = null; }

  const t0r = ts.length ? ts[0] : 0;
  const R = raw.map(x => Math.round(x * 1000) / 1000);
  const G = rawG.map(x => Math.round(x * 1000) / 1000);
  const B = rawB.map(x => Math.round(x * 1000) / 1000);
  const T = ts.map(x => Math.round((x - t0r) * 1000) / 1000);
  const n = R.length;
  const csum = Math.round(
    R.reduce((a, b) => a + b, 0) + G.reduce((a, b) => a + b, 0) + B.reduce((a, b) => a + b, 0));
  const payload = R.join(',') + '\n' + G.join(',') + '\n' + B.join(',') + '\n' + T.join(',');

  RINGP.style.strokeDashoffset = 0;   // ringen full = mätningen klar
  SUB.textContent = TR.compressing(n);
  const enc = await gzipB64url(payload);
  const effectQ = EFFECT ? ('&effect=' + EFFECT + '&estep=' + ESTEP) : '';
  const url = 'hrvresult://raw?d=' + enc.b64 + '&n=' + n + '&csum=' + csum + '&fps=' + fps.toFixed(2) + '&dur=' + DUR + effectQ;

  log('payload n=' + n + ' gz=' + enc.gz + 'B b64=' + enc.b64.length + 'B csum=' + csum);
  SUB.textContent = TR.done(n, (enc.b64.length / 1024 | 0));
  const btn = document.getElementById('resultBtn');
  btn.setAttribute('href', url);
  btn.style.display = 'block';

  // Manuell stopp: stopp-knappens klick är en färsk user-gesture → navigera direkt till
  // resultatet. Det når BridgeResultActivity → host-FGS stoppas → TORCH SLÄCKS PROMPT
  // (annars lyser den tills FGS:ens 65s-fönster löper ut — det var buggen). Knappen ovan
  // står kvar som fallback om navigeringen skulle blockeras. (Auto-stopp navigerar EJ —
  // user-activation är då utgången; knappen är dess pålitliga väg.)
  if (manual) location.href = url;
}

STOP.addEventListener('click', () => { finish(true); });   // manuell stopp (färsk gesture)

// AVBROTT-skydd (torch-svans): om sidan blir DOLD (hemsvep, app-byte) INNAN mätslut → SLÄPP
// kameran (track.stop). Host-FGS:ens AvailabilityCallback ser kameran frigöras → släcker host-
// torch (~1s). Host-appen är bakgrundad HELA mätningen, så detta är kroken som fångar hemsvep/
// app-byte. Vi navigerar INTE till en custom-scheme — Android BAL blockerar Activity-launch från
// bakgrundande Chrome (device-bevisat: lampan slocknade först på 65s-fönstret). Kamera-frigörning
// funkar utan foreground. `fired` = mätningen redan klar (finish() stoppar redan tracket) → hoppa
// över. `leftOnce` = en gång. Återkomst: capturen är död (torch släckt) → avbrott = avbrott.
let leftOnce = false;
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && !fired && !leftOnce) {
    leftOnce = true;
    if (stm) { stm.getTracks().forEach(t => t.stop()); stm = null; }
  }
});

// Tap-to-start: mätningen börjar på en tap PÅ SIDAN (ej auto) → ger user-activation så Chrome
// tillåter navigator.vibrate (andnings-haptiken). Tappen = "placera finger + börja".
const START = document.getElementById('startBtn');
START.addEventListener('click', () => {
  // Bekräftelse-buzz i SJÄLVA tap-gesten (starkaste user-activation) → taktil "startad"-känsla +
  // använder vibrationen i den garanterat aktiverade kontexten. Bara när andningsguiden är på
  // (då fasbytes-haptiken förväntas). DIAGNOS du kan känna: buzzar start-tappen men INTE fasbytena
  // → aktiveringen gavs men tappades senare (effekt-flödets om-launch). Sker FÖRE SETTLE/capture
  // → noll PPG-påverkan. (Fixar den intermittenta haptik-bortfallet i "Mät effekt av guiden".)
  if (SHOW_BREATH && navigator.vibrate) _HD.tap = String(navigator.vibrate(30));   // DIAG: gest-vibrate-retur
  else _HD.tap = navigator.vibrate ? 'breathOff' : 'noAPI';
  hdRender('tap');
  START.style.display = 'none';
  document.getElementById('intro').style.display = 'none';   // dölj instruktionen när mätningen kör
  start();
});
</script>
<script>
// ── SERVICE WORKER (offline-cachning av capture-sidan) ──────────────────────
// ROBUSTHET, ej DSP: cachar denna self-contained HTML (allt inline) så en mätning
// fungerar offline / när GitHub Pages är nere. Rör EJ rå R/G/B → native — deep-
// linken hrvresult:// är ett custom-scheme som INTE går genom service-workern, och
// all DSP körs native. SW:n ser bara HTML-laddningen. Detaljer + cache-buster-
// samspel (?t) + uppdaterings-disciplin: se sw.js.
//
// ⚠️ FÖR ATT PUSHA EN UPPDATERING AV DENNA SIDA: ändra index.html + BUMPA
//    CACHE_VERSION i sw.js (vN → vN+1). Annars serverar SW:n gammal cachad sida.
if ('serviceWorker' in navigator) {
  // updateViaCache:'none' → Chrome hämtar sw.js förbi HTTP-cachen vid varje
  // uppdaterings-koll → en bumpad CACHE_VERSION upptäcks direkt (ej fördröjt).
  navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' })
    .catch(function () { /* tyst: sidan fungerar online även utan SW */ });
}
</script>
